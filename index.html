<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LUPO 花見 2026 🌸 みんなの自己紹介</title>
<meta name="description" content="LUPO HAPPY HOUR 花見スペシャル — みんなの自己紹介ボード">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-start: #fff5f7; --bg-mid: #fce8ec; --bg-end: #e8d0d8;
    --card-bg: rgba(255,255,255,0.75); --card-border: rgba(255,200,210,0.4);
    --text-dark: #3a2a2a; --text-mid: #6a5555; --text-light: #9a7a7a; --text-muted: #b8a0a5;
    --accent: #d4576a; --accent-light: rgba(212,87,106,0.10); --accent-glow: rgba(212,87,106,0.3);
    --danger: #c06060; --serif: 'Noto Serif JP', serif; --sans: 'Noto Sans JP', sans-serif;
  }

  body {
    font-family: var(--sans); color: var(--text-dark);
    background: linear-gradient(170deg, var(--bg-start) 0%, var(--bg-mid) 30%, var(--bg-end) 100%);
    min-height: 100vh; min-height: 100dvh; overflow-x: hidden; position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sakura petals ── */
  .sakura-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .petal {
    position: absolute; top: -20px; border-radius: 50% 0 50% 0;
    background: radial-gradient(ellipse at 30% 30%, #ffc0cb, #f8a4b8);
    animation: sakuraFall var(--dur) var(--delay) infinite ease-in;
  }
  @keyframes sakuraFall {
    0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 1; } 90% { opacity: 1; }
    100% { transform: translateY(100vh) translateX(var(--drift)) rotate(720deg); opacity: 0; }
  }

  /* ── Layout ── */
  .app { position: relative; z-index: 1; padding-bottom: 40px; }

  /* ── Header ── */
  .header { text-align: center; padding: 36px 20px 24px; }
  .header-card {
    display: inline-block; background: var(--card-bg); backdrop-filter: blur(12px);
    border-radius: 20px; padding: 28px 40px 24px; max-width: 480px; width: 100%;
    box-shadow: 0 8px 40px rgba(180,100,120,0.10); border: 1px solid rgba(255,200,210,0.5);
  }
  .header-icon { font-size: 38px; margin-bottom: 4px; }
  .header h1 {
    font-family: var(--serif); font-size: clamp(22px, 5vw, 30px);
    font-weight: 700; letter-spacing: 2px; margin-bottom: 4px;
  }
  .header p { font-size: 13px; color: var(--text-light); letter-spacing: 1px; margin-bottom: 18px; }
  .tabs { display: flex; gap: 8px; justify-content: center; }
  .tab {
    font-family: var(--sans); font-size: 13px; padding: 9px 22px; border-radius: 24px;
    border: none; cursor: pointer; transition: all 0.25s ease; font-weight: 500;
    background: rgba(220,180,190,0.2); color: var(--text-mid);
  }
  .tab.active {
    font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #e8788a, var(--accent));
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  /* ── Form ── */
  .form-wrap { max-width: 420px; margin: 0 auto; padding: 0 20px 40px; }
  .form-card {
    background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 20px;
    padding: 28px 24px; box-shadow: 0 8px 40px rgba(180,100,120,0.08);
    border: 1px solid var(--card-border);
  }
  .form-card.editing { border: 2px solid rgba(212,87,106,0.4); }
  .editing-banner {
    text-align: center; margin-bottom: 16px; font-size: 13px; font-weight: 600;
    color: var(--accent); background: var(--accent-light); border-radius: 10px; padding: 8px 12px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; font-weight: 600; color: var(--text-mid);
    margin-bottom: 6px; letter-spacing: 0.5px;
  }
  .field label .req { color: var(--accent); }
  .field input, .field textarea {
    width: 100%; padding: 12px 16px; border-radius: 12px; font-size: 15px;
    border: 1.5px solid rgba(200,170,175,0.4); font-family: var(--sans);
    background: rgba(255,255,255,0.8); color: var(--text-dark); outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { min-height: 60px; resize: vertical; }

  /* ── Photo upload ── */
  .photo-wrap { text-align: center; margin-bottom: 16px; }
  .photo-circle {
    width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 10px;
    border: 3px dashed rgba(200,140,150,0.5); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; overflow: hidden; background-size: cover; background-position: center;
    background-color: #f5e0e4;
  }
  .photo-circle:hover { border-color: var(--accent); }
  .photo-circle .placeholder { text-align: center; }
  .photo-circle .placeholder .cam { font-size: 28px; }
  .photo-circle .placeholder .txt { font-size: 10px; color: #b08a90; }
  .photo-change {
    font-size: 11px; color: #b08a90; background: none; border: none;
    cursor: pointer; text-decoration: underline;
  }

  /* ── Service chips ── */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;
    font-family: var(--sans); transition: all 0.2s ease; display: flex;
    align-items: center; gap: 4px; white-space: nowrap; border: 1.5px solid rgba(200,170,175,0.35);
    background: rgba(255,255,255,0.6); color: var(--text-mid); font-weight: 400;
  }
  .chip.active {
    border-color: var(--accent); font-weight: 600; color: #c04a5e;
    background: linear-gradient(135deg, rgba(232,120,138,0.15), var(--accent-light));
  }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 10px; margin-top: 24px; }
  .btn-primary {
    flex: 1; padding: 14px 0; border-radius: 14px; border: none; font-size: 16px;
    font-weight: 700; font-family: var(--sans); cursor: pointer; letter-spacing: 1px;
    background: linear-gradient(135deg, #e8788a, var(--accent)); color: #fff;
    box-shadow: 0 6px 24px var(--accent-glow); transition: all 0.3s ease;
  }
  .btn-primary:disabled { background: rgba(200,180,185,0.3); color: #bba0a5; box-shadow: none; cursor: default; }
  .btn-cancel {
    flex: 0 0 auto; padding: 14px 20px; border-radius: 14px; font-size: 14px; font-weight: 600;
    font-family: var(--sans); cursor: pointer; background: rgba(255,255,255,0.6);
    color: var(--text-mid); border: 1.5px solid rgba(200,170,175,0.4);
  }

  /* ── Cards ── */
  .list-wrap { max-width: 520px; margin: 0 auto; padding: 0 16px 40px; }
  .list-count { text-align: center; margin-bottom: 18px; font-size: 13px; color: var(--text-light); }
  .card-list { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 18px;
    padding: 20px 18px; border: 1px solid rgba(255,200,210,0.35);
    box-shadow: 0 4px 20px rgba(180,100,120,0.06); position: relative;
    animation: cardIn 0.4s both ease-out;
  }
  .card-body { display: flex; gap: 14px; align-items: flex-start; }
  .avatar {
    width: 60px; height: 60px; min-width: 60px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    border: 2px solid rgba(255,220,225,0.6); box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden; background-size: cover; background-position: center;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .card-name { font-weight: 700; font-size: 16px; }
  .card-menu {
    background: none; border: none; cursor: pointer; padding: 2px 6px;
    font-size: 18px; color: var(--text-muted); line-height: 1; border-radius: 6px;
  }
  .card-work { font-size: 11.5px; color: var(--accent); font-weight: 600; margin-bottom: 4px; letter-spacing: 0.3px; }
  .card-intro { font-size: 13px; color: var(--text-mid); line-height: 1.5; margin-bottom: 4px; }
  .card-looking {
    font-size: 12px; color: #9a8080; background: rgba(255,200,210,0.15);
    border-radius: 8px; padding: 5px 10px; margin-top: 6px; display: inline-block;
  }
  .card-services { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .svc-badge {
    font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 10px;
    background: rgba(60,45,45,0.06); color: #7a6060; white-space: nowrap;
  }

  /* ── Card actions ── */
  .card-actions {
    margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(200,170,175,0.2);
    display: flex; gap: 8px; justify-content: flex-end; align-items: center;
    animation: cardIn 0.2s ease-out;
  }
  .btn-edit {
    padding: 6px 16px; border-radius: 10px; border: 1.5px solid rgba(200,170,175,0.4);
    background: rgba(255,255,255,0.7); cursor: pointer; font-size: 12px;
    font-family: var(--sans); font-weight: 600; color: var(--text-mid);
  }
  .btn-delete {
    padding: 6px 16px; border-radius: 10px; border: 1.5px solid rgba(220,120,120,0.3);
    background: rgba(255,235,235,0.7); cursor: pointer; font-size: 12px;
    font-family: var(--sans); font-weight: 600; color: var(--danger);
  }
  .btn-confirm-del {
    padding: 6px 16px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #e07070, #c05050); cursor: pointer;
    font-size: 12px; font-family: var(--sans); font-weight: 700; color: #fff;
  }
  .btn-nevermind {
    padding: 6px 16px; border-radius: 10px; border: 1.5px solid rgba(200,170,175,0.4);
    background: rgba(255,255,255,0.7); cursor: pointer; font-size: 12px;
    font-family: var(--sans); font-weight: 500; color: var(--text-mid);
  }
  .confirm-text { font-size: 12px; color: var(--danger); font-weight: 500; }

  /* ── Empty / Success ── */
  .center-card {
    text-align: center; padding: 40px 20px;
  }
  .center-card .inner {
    background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 20px;
    padding: 48px 32px; max-width: 380px; margin: 0 auto;
    border: 1px solid var(--card-border); box-shadow: 0 8px 40px rgba(180,100,120,0.08);
    animation: cardIn 0.5s ease-out;
  }
  .center-card .big-icon { font-size: 48px; margin-bottom: 12px; }
  .center-card h2 { font-family: var(--serif); font-size: 22px; margin-bottom: 8px; }
  .center-card p { font-size: 14px; color: var(--text-mid); line-height: 1.7; margin-bottom: 24px; }
  .center-card .btn-primary { flex: none; padding: 12px 32px; font-size: 15px; }

  /* ── Footer ── */
  .footer { text-align: center; padding: 20px 16px 32px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; }

  /* ── Loading ── */
  .loading {
    min-height: 100vh; min-height: 100dvh; display: flex; align-items: center;
    justify-content: center; text-align: center; color: var(--text-light);
  }
  .loading .icon { font-size: 40px; margin-bottom: 12px; animation: pulse 1.5s infinite; }

  @keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  /* ── Gradient color sets for avatars ── */
  .grad0 { background: linear-gradient(135deg, #f8b4c0, #e8a0b0); }
  .grad1 { background: linear-gradient(135deg, #b8d4e8, #a0c0d4); }
  .grad2 { background: linear-gradient(135deg, #d4c8f0, #beb0e0); }
  .grad3 { background: linear-gradient(135deg, #c8e8c0, #b0d4a8); }
  .grad4 { background: linear-gradient(135deg, #f0d8b0, #e0c8a0); }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
  🔧 Firebase 設定
  下記の firebaseConfig を自分のプロジェクトの値に置き換えてください。
  セットアップ手順は README.md を参照。
════════════════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvbq-Lrb4hQoSP73QoYn1vH5bq1Akuqgg",
  authDomain: "lookup-hanami2026.firebaseapp.com",
  databaseURL: "https://lookup-hanami2026-default-rtdb.firebaseio.com",
  projectId: "lookup-hanami2026",
  storageBucket: "lookup-hanami2026.firebasestorage.app",
  messagingSenderId: "70323021018",
  appId: "1:70323021018:web:445250f3b5eea2ef2571e3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const participantsRef = ref(db, "hanami2026/participants");

/* ── Data ── */
const SERVICES = [
  { id: "coffee", label: "LOOK UP COFFEE", emoji: "☕", sub: "" },
  { id: "lupo", label: "LUPO", emoji: "💻", sub: "コワーキング" },
  { id: "accounting", label: "LOOK UP ACCOUNTING", emoji: "📊", sub: "会計・税務" },
  { id: "yoga", label: "LOOK UP YOGA", emoji: "🧘", sub: "朝ヨガ" },
  { id: "dance", label: "LOOK UP DANCE", emoji: "💃", sub: "ダンス" },
  { id: "campus", label: "LOOK UP CAMPUS", emoji: "🎭", sub: "演劇・セミナー・WS" },
];

/* ── State ── */
let state = {
  view: "register", // register | list
  participants: [],
  submitting: false,
  submitted: false,
  wasEdit: false,
  editId: null,
  openMenuId: null,
  confirmDeleteId: null,
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

/* ── Firebase listener (real-time!) ── */
onValue(participantsRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    state.participants = Object.entries(data).map(([id, v]) => ({ ...v, id }));
    state.participants.sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
  } else {
    state.participants = [];
  }
  document.getElementById("loading")?.remove();
  render();
});

/* ── Image resize ── */
function resizeImage(file, maxSize = 280) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > h) { h = (h / w) * maxSize; w = maxSize; } else { w = (w / h) * maxSize; h = maxSize; }
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ── Save ── */
async function handleSubmit() {
  const name = document.getElementById("f-name")?.value?.trim();
  if (!name || state.submitting) return;
  setState({ submitting: true });

  const data = {
    name,
    intro: document.getElementById("f-intro")?.value?.trim() || "",
    work: document.getElementById("f-work")?.value?.trim() || "",
    looking: document.getElementById("f-looking")?.value?.trim() || "",
    photo: window._currentPhoto || "",
    services: window._selectedServices || [],
    timestamp: state.editId
      ? (state.participants.find(p => p.id === state.editId)?.timestamp || new Date().toISOString())
      : new Date().toISOString(),
  };

  try {
    if (state.editId) {
      await update(ref(db, `hanami2026/participants/${state.editId}`), data);
      setState({ submitted: true, wasEdit: true, submitting: false, editId: null });
    } else {
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      await set(ref(db, `hanami2026/participants/${id}`), data);
      setState({ submitted: true, wasEdit: false, submitting: false });
    }
    window._currentPhoto = null;
    window._selectedServices = [];
  } catch (err) {
    console.error(err);
    alert("送信に失敗しました。もう一度お試しください。");
    setState({ submitting: false });
  }
}

/* ── Delete ── */
async function handleDelete(id) {
  try {
    await remove(ref(db, `hanami2026/participants/${id}`));
    setState({ openMenuId: null, confirmDeleteId: null });
  } catch (err) {
    console.error(err);
    alert("削除に失敗しました。");
  }
}

/* ── Render helpers ── */
function svcDisplay(svc) { return svc.sub || svc.label; }

function renderPetals() {
  let html = '<div class="sakura-container">';
  for (let i = 0; i < 18; i++) {
    const left = Math.random() * 100;
    const delay = Math.random() * 8;
    const dur = 6 + Math.random() * 6;
    const size = 8 + Math.random() * 14;
    const opacity = 0.15 + Math.random() * 0.25;
    const drift = -30 + Math.random() * 60;
    html += `<div class="petal" style="left:${left}%;width:${size}px;height:${size}px;opacity:${opacity};--dur:${dur}s;--delay:${delay}s;--drift:${drift}px"></div>`;
  }
  return html + '</div>';
}

function renderHeader() {
  const count = state.participants.length;
  const countLabel = count > 0 ? ` (${count})` : "";
  return `
    <header class="header"><div class="header-card">
      <div class="header-icon">🌸</div>
      <h1>LUPO 花見 2026</h1>
      <p>HAPPY HOUR Special — みんなの自己紹介</p>
      <div class="tabs">
        <button class="tab ${state.view === 'list' ? 'active' : ''}" onclick="switchView('list')">みんな一覧${countLabel}</button>
        <button class="tab ${state.view === 'register' ? 'active' : ''}" onclick="switchView('register')">自己紹介する</button>
      </div>
    </div></header>`;
}

function renderChips(selected) {
  return SERVICES.map(s => {
    const active = selected.includes(s.id);
    return `<button type="button" class="chip ${active ? 'active' : ''}" onclick="toggleChip('${s.id}')">
      <span>${s.emoji}</span><span>${svcDisplay(s)}</span>${active ? '<span style="font-size:10px;margin-left:2px">✓</span>' : ''}
    </button>`;
  }).join("");
}

function renderForm() {
  const p = state.editId ? state.participants.find(x => x.id === state.editId) : null;
  const isEditing = !!p;
  const photo = isEditing ? (window._currentPhoto ?? p?.photo ?? "") : (window._currentPhoto || "");
  const svcList = isEditing ? (window._selectedServices ?? p?.services ?? []) : (window._selectedServices || []);

  // Ensure globals are synced for editing
  if (isEditing && window._editInitId !== state.editId) {
    window._currentPhoto = p?.photo || null;
    window._selectedServices = [...(p?.services || [])];
    window._editInitId = state.editId;
  }

  const photoStyle = photo ? `background-image:url(${photo})` : "";

  return `
    <div class="form-wrap"><div class="form-card ${isEditing ? 'editing' : ''}">
      ${isEditing ? `<div class="editing-banner">✏️ 「${p.name}」さんの情報を編集中</div>` : ""}
      
      <div class="photo-wrap">
        <div class="photo-circle" style="${photoStyle}" onclick="document.getElementById('photo-input').click()">
          ${!photo ? '<div class="placeholder"><div class="cam">📷</div><div class="txt">タップして追加</div></div>' : ''}
        </div>
        <input type="file" id="photo-input" accept="image/*" capture="user" onchange="handlePhoto(this)" style="display:none">
        ${photo ? '<button class="photo-change" onclick="clearPhoto()">写真を変更</button>' : ''}
      </div>

      <div class="field">
        <label>名前・ニックネーム <span class="req">*</span></label>
        <input id="f-name" maxlength="20" placeholder="例：たろう" value="${isEditing ? escHtml(p.name) : ''}">
      </div>

      <div class="field">
        <label>利用しているLOOK UPサービス</label>
        <div class="chips" id="chips-area">${renderChips(svcList)}</div>
      </div>

      <div class="field">
        <label>ひとこと自己紹介</label>
        <textarea id="f-intro" maxlength="100" placeholder="例：下北沢大好きなフリーランスです！">${isEditing ? escHtml(p.intro || '') : ''}</textarea>
      </div>

      <div class="field">
        <label>お仕事・趣味</label>
        <input id="f-work" maxlength="50" placeholder="例：Webデザイナー / カメラ好き" value="${isEditing ? escHtml(p.work || '') : ''}">
      </div>

      <div class="field">
        <label>花見で楽しみなこと 🌸</label>
        <input id="f-looking" maxlength="60" placeholder="例：みんなでお花見しながら乾杯！" value="${isEditing ? escHtml(p.looking || '') : ''}">
      </div>

      <div class="btn-row">
        ${isEditing ? '<button class="btn-cancel" onclick="cancelEdit()">キャンセル</button>' : ''}
        <button class="btn-primary" onclick="handleSubmit()" ${state.submitting ? 'disabled' : ''}>
          ${state.submitting ? '送信中...' : isEditing ? '更新する ✏️' : '自己紹介を登録する 🌸'}
        </button>
      </div>
    </div></div>`;
}

function renderCard(p, i) {
  const hasPhoto = !!p.photo;
  const avatarStyle = hasPhoto ? `background-image:url(${p.photo})` : "";
  const gradClass = hasPhoto ? "" : `grad${i % 5}`;
  const initial = hasPhoto ? "" : (p.name?.[0] || "?");
  const isOpen = state.openMenuId === p.id;
  const isConfirming = state.confirmDeleteId === p.id;

  let services = "";
  if (p.services?.length) {
    services = '<div class="card-services">' + p.services.map(sid => {
      const svc = SERVICES.find(s => s.id === sid);
      return svc ? `<span class="svc-badge">${svc.emoji} ${svcDisplay(svc)}</span>` : "";
    }).join("") + '</div>';
  }

  let actions = "";
  if (isOpen) {
    if (!isConfirming) {
      actions = `<div class="card-actions">
        <button class="btn-edit" onclick="startEdit('${p.id}')">✏️ 編集</button>
        <button class="btn-delete" onclick="confirmDelete('${p.id}')">🗑 削除</button>
      </div>`;
    } else {
      actions = `<div class="card-actions">
        <span class="confirm-text">本当に削除しますか？</span>
        <button class="btn-confirm-del" onclick="handleDelete('${p.id}')">削除する</button>
        <button class="btn-nevermind" onclick="cancelConfirm()">やめる</button>
      </div>`;
    }
  }

  return `<div class="card" style="animation-delay:${i * 0.05}s">
    <div class="card-body">
      <div class="avatar ${gradClass}" style="${avatarStyle}">${initial}</div>
      <div class="card-info">
        <div class="card-top">
          <div class="card-name">${escHtml(p.name)}</div>
          <button class="card-menu" onclick="toggleMenu('${p.id}')">⋯</button>
        </div>
        ${p.work ? `<div class="card-work">${escHtml(p.work)}</div>` : ''}
        ${p.intro ? `<div class="card-intro">${escHtml(p.intro)}</div>` : ''}
        ${p.looking ? `<div class="card-looking">🌸 ${escHtml(p.looking)}</div>` : ''}
        ${services}
      </div>
    </div>
    ${actions}
  </div>`;
}

function renderList() {
  if (state.participants.length === 0) {
    return `<div class="center-card"><div class="inner">
      <div class="big-icon" style="font-size:48px">🌸</div>
      <p style="font-size:15px;line-height:1.7">まだ誰も登録していません。<br>最初の一人になろう！</p>
    </div></div>`;
  }
  return `<div class="list-wrap">
    <div class="list-count">🌸 ${state.participants.length}人が参加中</div>
    <div class="card-list">${state.participants.map((p, i) => renderCard(p, i)).join("")}</div>
  </div>`;
}

function renderSuccess() {
  const icon = state.wasEdit ? "✏️" : "🎉";
  const title = state.wasEdit ? "更新完了！" : "登録完了！";
  const msg = state.wasEdit ? "情報を更新しました！" : "自己紹介ありがとうございます！";
  return `<div class="center-card"><div class="inner">
    <div class="big-icon" style="font-size:56px">${icon}</div>
    <h2>${title}</h2>
    <p>${msg}<br>みんなの一覧を見てみましょう 🌸</p>
    <button class="btn-primary" onclick="switchView('list')">みんなを見る →</button>
  </div></div>`;
}

/* ── Main render ── */
function render() {
  const app = document.getElementById("app");
  if (!app) return;

  let body = "";
  if (state.view === "register" && !state.submitted) body = renderForm();
  else if (state.view === "register" && state.submitted) body = renderSuccess();
  else body = renderList();

  app.innerHTML = renderHeader() + body + '<div class="footer">LUPO 下北沢 — HAPPY HOUR 花見 2026 🌸</div>';
}

/* ── Escape HTML ── */
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ── Globals for event handlers ── */
window._currentPhoto = null;
window._selectedServices = [];
window._editInitId = null;

window.switchView = (v) => {
  setState({ view: v, submitted: false, editId: null, openMenuId: null, confirmDeleteId: null });
  window._currentPhoto = null;
  window._selectedServices = [];
  window._editInitId = null;
};

window.handleSubmit = handleSubmit;
window.handleDelete = handleDelete;

window.handlePhoto = async (input) => {
  const file = input.files?.[0];
  if (!file) return;
  window._currentPhoto = await resizeImage(file);
  render();
};
window.clearPhoto = () => { window._currentPhoto = null; render(); };

window.toggleChip = (id) => {
  const arr = window._selectedServices || [];
  const idx = arr.indexOf(id);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(id);
  window._selectedServices = arr;
  document.getElementById("chips-area").innerHTML = renderChips(arr);
};

window.toggleMenu = (id) => {
  setState({
    openMenuId: state.openMenuId === id ? null : id,
    confirmDeleteId: null,
  });
};
window.confirmDelete = (id) => setState({ confirmDeleteId: id });
window.cancelConfirm = () => setState({ confirmDeleteId: null });

window.startEdit = (id) => {
  window._editInitId = null;
  setState({ editId: id, view: "register", submitted: false, openMenuId: null });
};
window.cancelEdit = () => {
  window._editInitId = null;
  window._currentPhoto = null;
  window._selectedServices = [];
  setState({ editId: null });
};

/* ── Initial render with petals ── */
document.addEventListener("DOMContentLoaded", () => {
  document.body.insertAdjacentHTML("afterbegin", renderPetals());
});
</script>

<!-- Loading state (removed by Firebase onValue) -->
<div id="loading" class="loading">
  <div>
    <div class="icon">🌸</div>
    <p>読み込み中...</p>
  </div>
</div>

<div id="app" class="app"></div>

</body>
</html>
